[config]
skip_core_tasks = true
skip_git_env_info = true
skip_rust_env_info = true
skip_crate_env_info = true

[tasks.typecheck]
description = "Run type checks"
command = "pnpm"
args = ["typecheck"]
[tasks.typecheck.windows]
command = "pnpm.cmd"

[tasks.lint-staged]
description = "Run lint-staged for staged files"
command = "pnpm"
args = ["exec", "lint-staged"]
[tasks.lint-staged.windows]
command = "pnpm.cmd"

[tasks.git-add]
description = "Add desktop locale files to git"
command = "git"
args = ["add", "apps/archclash/frontend/src/locales"]

# --- Jobs ---

[tasks.frontend-format]
description = "Frontend format checks"
dependencies = ["lint-staged"]

# --- Git Hooks ---

[tasks.pre-commit]
description = "Pre-commit: lint-staged only"
dependencies = ["lint-staged"]

[tasks.pre-push]
description = "Pre-push: TypeScript check"
dependencies = ["typecheck"]
