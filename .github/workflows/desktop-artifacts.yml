# Builds ArchClash desktop for Windows, macOS (Apple Silicon + Intel), and Linux.
# Service binaries: https://github.com/Nemu-x/arch-clash-service-ipc/releases
# Run: workflow_dispatch or push tag v* for the full release artifact set.

name: Desktop artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: desktop-artifacts-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: apps/arch-clash-desktop/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install NSIS (Windows installer)
        run: choco install nsis -y

      - name: Desktop resources + icons + NSIS template
        run: pnpm run desktop:resources

      - name: Verify Windows tray icon (go:embed build/windows/icon.ico)
        shell: pwsh
        run: |
          $ico = "apps/arch-clash-desktop/build/windows/icon.ico"
          if (-not (Test-Path $ico)) {
            throw "Missing $ico — ensure copy:desktop-appicon + icons:windows ran (desktop:resources)."
          }
          if ((Get-Item $ico).Length -lt 64) {
            throw "$ico exists but is suspiciously small."
          }
          $arch = "apps/arch-clash-desktop/trayicons/arch.png"
          if (-not (Test-Path $arch)) {
            throw "Missing $arch — sync-desktop-packaging should copy appicon after prebuild."
          }

      - name: Wails build (windows/amd64 + NSIS)
        run: pnpm run desktop:build:windows

      - name: Pack Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $installer = Get-ChildItem "apps/arch-clash-desktop/build/bin" -Filter "*-installer.exe" | Select-Object -First 1
          if (-not $installer) { throw "Windows installer .exe not found in build/bin" }
          # Raw installer .exe — the in-app updater downloads this directly (must
          # contain "installer" + "amd64" so pickWindowsInstallerAsset matches).
          Copy-Item $installer.FullName "dist/ArchClash-windows-amd64-installer.exe" -Force
          Compress-Archive -Path $installer.FullName -DestinationPath "dist/arch-clash-windows-amd64-installer.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-amd64
          path: |
            dist/ArchClash-windows-amd64-installer.exe
            dist/arch-clash-windows-amd64-installer.zip

  windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: apps/arch-clash-desktop/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install NSIS (Windows installer)
        run: choco install nsis -y

      - name: Desktop resources + icons + NSIS template
        run: pnpm run desktop:resources

      - name: Verify Windows tray icon (go:embed build/windows/icon.ico)
        shell: pwsh
        run: |
          $ico = "apps/arch-clash-desktop/build/windows/icon.ico"
          if (-not (Test-Path $ico)) {
            throw "Missing $ico — ensure copy:desktop-appicon + icons:windows ran (desktop:resources)."
          }
          if ((Get-Item $ico).Length -lt 64) {
            throw "$ico exists but is suspiciously small."
          }
          $arch = "apps/arch-clash-desktop/trayicons/arch.png"
          if (-not (Test-Path $arch)) {
            throw "Missing $arch — sync-desktop-packaging should copy appicon after prebuild."
          }

      - name: Wails build (windows/arm64 + NSIS)
        id: wails_windows_arm64
        continue-on-error: true
        run: pnpm run desktop:build:windows:arm64

      - name: Pack Windows ARM64 artifact
        id: pack_windows_arm64
        continue-on-error: true
        if: steps.wails_windows_arm64.outcome == 'success'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $installer = Get-ChildItem "apps/arch-clash-desktop/build/bin" -Filter "*-installer.exe" | Select-Object -First 1
          if (-not $installer) { throw "Windows installer .exe not found in build/bin" }
          Copy-Item $installer.FullName "dist/ArchClash-windows-arm64-installer.exe" -Force
          Compress-Archive -Path $installer.FullName -DestinationPath "dist/arch-clash-windows-arm64-installer.zip" -Force

      - uses: actions/upload-artifact@v4
        if: steps.pack_windows_arm64.outcome == 'success'
        with:
          name: release-windows-arm64
          path: |
            dist/ArchClash-windows-arm64-installer.exe
            dist/arch-clash-windows-arm64-installer.zip

  darwin-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: apps/arch-clash-desktop/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Desktop resources
        run: pnpm run desktop:resources

      - name: Verify macOS tray mono icon (go:embed)
        run: test -f apps/arch-clash-desktop/trayicons/mono.png

      - name: Wails build (darwin/arm64)
        run: pnpm run desktop:build:darwin:arm64

      - name: Package DMG (darwin/arm64)
        run: pnpm run desktop:package:dmg

      - name: Pack macOS arm64 artifact
        run: |
          mkdir -p dist
          cp apps/arch-clash-desktop/build/bin/*.dmg dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: release-darwin-arm64
          path: dist/*.dmg

  darwin-amd64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: apps/arch-clash-desktop/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Desktop resources
        run: pnpm run desktop:resources

      - name: Verify macOS tray mono icon (go:embed)
        run: test -f apps/arch-clash-desktop/trayicons/mono.png

      - name: Wails build (darwin/amd64)
        id: wails_darwin_amd64
        continue-on-error: true
        run: pnpm run desktop:build:darwin:amd64

      - name: Package DMG (darwin/amd64)
        id: pack_darwin_amd64
        continue-on-error: true
        if: steps.wails_darwin_amd64.outcome == 'success'
        run: pnpm run desktop:package:dmg

      - name: Pack macOS Intel artifact
        id: pack_darwin_amd64_dist
        continue-on-error: true
        if: steps.pack_darwin_amd64.outcome == 'success'
        run: |
          mkdir -p dist
          cp apps/arch-clash-desktop/build/bin/*.dmg dist/ || true

      - uses: actions/upload-artifact@v4
        if: steps.pack_darwin_amd64_dist.outcome == 'success'
        with:
          name: release-darwin-amd64
          path: dist/*.dmg

  linux-amd64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: apps/arch-clash-desktop/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4

      - name: Linux GUI deps (GTK + WebKit2GTK 4.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Desktop resources
        run: pnpm run desktop:resources

      - name: Wails build (linux/amd64)
        run: pnpm run desktop:build:linux:amd64

      - name: Pack Linux artifact (preserve executable bits)
        run: |
          mkdir -p dist
          tar -C apps/arch-clash-desktop/build/bin -czf "dist/arch-clash-linux-amd64.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-amd64
          path: dist/arch-clash-linux-amd64.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - windows-amd64
      - windows-arm64
      - darwin-arm64
      - darwin-amd64
      - linux-amd64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
      MINISIGN_SIGN_PASSWORD: ${{ secrets.MINISIGN_SIGN_PASSWORD }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate SHA256SUMS (by asset basename)
        shell: bash
        run: |
          cd dist
          : > SHA256SUMS
          while IFS= read -r f; do
            d=$(sha256sum "$f" | cut -d' ' -f1)
            echo "$d  $(basename "$f")" >> SHA256SUMS
          done < <(find . -type f \( -name '*.exe' -o -name '*.zip' -o -name '*.tar.gz' -o -name '*.dmg' \) | sort)
          echo "----- SHA256SUMS -----"; cat SHA256SUMS

      - name: Sign SHA256SUMS with minisign
        if: ${{ env.MINISIGN_SECRET_KEY != '' }}
        shell: bash
        run: |
          sudo apt-get update -y && sudo apt-get install -y minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          printf '%s\n' "$MINISIGN_SIGN_PASSWORD" | minisign -S -s minisign.key -m dist/SHA256SUMS
          rm -f minisign.key
          test -f dist/SHA256SUMS.minisig && echo "signed OK"

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: false
          files: |
            dist/**/*.exe
            dist/**/*.zip
            dist/**/*.tar.gz
            dist/**/*.dmg
            dist/SHA256SUMS
            dist/SHA256SUMS.minisig
